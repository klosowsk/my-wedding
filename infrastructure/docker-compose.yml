services:
  postgres:
    image: postgres:16
    container_name: marriage-db
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: marriage
    volumes:
      - marriage_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: marriage-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-marriage}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-marriage_dev_secret}
    ports:
      - "9010:9000"   # S3 API
      - "9011:9001"   # Console UI
    volumes:
      - marriage_minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    container_name: marriage-minio-init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      mc alias set marriage http://minio:9000 $${MINIO_ROOT_USER:-marriage} $${MINIO_ROOT_PASSWORD:-marriage_dev_secret};
      mc mb --ignore-existing marriage/marriage-uploads;
      mc anonymous set download marriage/marriage-uploads;
      exit 0;
      "

volumes:
  marriage_data:
  marriage_minio_data:
